# default config can be found https://docs.astral.sh/ruff/configuration/

required-version = ">=0.13.0"

exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "docs",
    "node_modules",
    "site-packages",
    ".venv",
    "*egg-info",
    "Core/BosonSDK/**",
]

line-length = 120
indent-width = 4
# target-version = "py312"  # Uncomment and set the target Python version if needed

[lint]
select = [ # https://docs.astral.sh/ruff/rules/
    "C",      # Complexity
    "D300",   # prefer triple double quotes
    "D402",   # forbid signature in first line
    "D417",   # args in docstring must match function signature
    "E",      # PyCodeStyle Errors
    "F",      # PyFlakes
    "N",      # Naming
    "W",      # PyCodeStyle Warnings
    "ANN",    # flake8-annotations
    "B",      # flake8-bugbear
    "TC",     # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "NPY",    # NumPy specific rules
    "TID",    # flake8-tidy-imports
    "SIM",    # flake8-simplify
    "I",      # isort
    "PL",     # PyLint
    "ERA",    # eradicate
    "TID252", # prefer absolute over relative imports
]
ignore = [
    "PLC0415", # import at top of scope
    "E402",    # import at top of file
    "N999",    # snake_case in module names
    "B905",    # zip without explicit strict
]
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
preview = true

[lint.pylint]
max-args = 10
max-returns = 20

[lint.per-file-ignores]
"tests/*" = ["D100", "D103", "ANN001", "ANN201", "PLR2004", "SIM115", "PLR6301"]
"*.ipynb" = ["D101", "D102", "D103", "D107", "E402", "I001"]

[lint.pydocstyle]
convention = "google"

[lint.pep8-naming]
extend-ignore-names = [
    "H",
    "H*",
    "Hk_*", # Homography matrix
    "K",    # Camera intrinsics matrix
    "R",
    "R_*",  # Rotation matrix (R, R_x, R_y, R_z, R_rpy, etc.)
    "T",    # Transformation matrix
    "P",    # Homogeneous point
    "B",    # Batch size
    "C",    # Channel size
    "W",    # Width
    "G",    # Gray level or Green channel
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"
