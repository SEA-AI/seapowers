name: Skill Token Check

on:
  pull_request:
  # paths:
  #   - 'skills/**/SKILL.md'

jobs:
  token-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Measure SKILL.md budgets
        id: report
        run: |
          set +e
          fail=0
          {
            echo "| Skill | Description (chars / 1024) | Body (tokens / 5000) | Status |"
            echo "|---|---|---|---|"
          } > report.md

          while IFS= read -r -d '' file; do
            description=$(awk '
              /^---[[:space:]]*$/ { fm++; next }
              fm == 1 {
                if (/^description:[[:space:]]*[|>]/) { collect=1; next }
                if (collect && /^[a-zA-Z_-]+:/) { collect=0 }
                if (collect) { print; next }
                if (/^description:[[:space:]]*/) {
                  sub(/^description:[[:space:]]*/, "")
                  gsub(/^["'"'"']|["'"'"']$/, "")
                  print
                }
              }
            ' "$file")
            desc_len=${#description}

            body=$(awk '/^---[[:space:]]*$/ { fm++; next } fm >= 2 { print }' "$file")
            body_chars=${#body}
            body_tokens=$(( body_chars / 4 ))

            status="✅"
            if [ "$desc_len" -gt 1024 ] || [ "$body_tokens" -gt 5000 ]; then
              status="❌"
              fail=1
            fi

            echo "| \`$file\` | $desc_len | $body_tokens | $status |" >> report.md
          done < <(find skills -name SKILL.md -print0)

          cat report.md
          {
            echo 'table<<EOF'
            cat report.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "fail=$fail" >> "$GITHUB_OUTPUT"
          exit $fail

      - name: Post failure comment
        if: failure() && steps.report.outputs.fail == '1'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: skill-token-check
          message: |
            ❌ **Skill Token Check Failed**

            ${{ steps.report.outputs.table }}

            **Limits** ([Anthropic best practices](https://platform.claude.com/docs/en/agents-and-tools/agent-skills/best-practices)):
            - Frontmatter `description`: ≤ **1024 characters** (hard cap)
            - `SKILL.md` body: ≤ **~5000 tokens** (estimated as chars / 4)

            **How to fix:**
            - Trim verbose explanations — Claude already knows common concepts
            - Move detailed reference material into separate files (e.g. `reference/*.md`)
            - Use progressive disclosure: link from `SKILL.md` to deeper docs
            - Keep references one level deep from `SKILL.md`

      - name: Post success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: skill-token-check
          message: |
            ✅ **Skill Token Check Passed**

            ${{ steps.report.outputs.table }}

            Limits: description ≤ 1024 chars, body ≤ ~5000 tokens (chars / 4).
