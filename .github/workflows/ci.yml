name: CI

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files: |
            skills/**
            .claude-plugin/**

      - name: Check version bumps and semver
        if: steps.changed.outputs.any_changed == 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          base="origin/$BASE_REF"
          git fetch origin "$BASE_REF" --depth=1
          changed=$(git diff --name-only "$base"...HEAD)

          semver='^[0-9]+\.[0-9]+\.[0-9]+$'
          check() {
            local file=$1 jq_path=$2 label=$3 pattern=$4
            local new old
            new=$(jq -r "$jq_path" "$file")
            [[ $new =~ $semver ]] || { echo "❌ Invalid semver in $file: $new"; return 1; }
            echo "$changed" | grep -qE "$pattern" || return 0
            old=$(git show "$base:$file" | jq -r "$jq_path")
            [ "$old" != "$new" ] || { echo "❌ $label changed but $file version not bumped ($old)"; return 1; }
            echo "✅ $label: $old → $new"
          }

          check .claude-plugin/plugin.json       .version          "Skills"      '^skills/'
          check .claude-plugin/marketplace.json  .metadata.version "Marketplace" '^\.claude-plugin/marketplace\.json$'

      - name: Post version-check result
        if: always() && steps.changed.outputs.any_changed == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: version-check
          message: |
            ${{ job.status == 'success' && '✅ **Version Check Passed**' || '❌ **Version Check Failed**' }}

            **Bump rules:**
            - Skills modified → bump `.claude-plugin/plugin.json` version
            - Marketplace modified → bump `.claude-plugin/marketplace.json` version
            - Format: semantic versioning (`X.Y.Z`)

            **Semver guide:** `PATCH` = fixes · `MINOR` = features · `MAJOR` = breaking

  skill-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files: |
            skills/**
            .claude-plugin/**

      - name: Get changed markdown files
        id: changed-md
        if: steps.changed.outputs.any_changed == 'true'
        uses: tj-actions/changed-files@v47
        with:
          files: '**/*.md'

      - uses: astral-sh/setup-uv@v5
        if: steps.changed.outputs.any_changed == 'true'

      - name: Check descriptions
        id: descriptions
        if: steps.changed.outputs.any_changed == 'true'
        continue-on-error: true
        run: |
          {
            echo "| Skill | Description (chars / 1024) | Status |"
            echo "|---|---|---|"
          } > descriptions.md

          fail=0
          while IFS= read -r -d '' file; do
            frontmatter=$(awk '/^---[[:space:]]*$/ { c++; next } c == 1' "$file")
            desc_len=$(echo "$frontmatter" | yq -r '.description // ""' | tr -d '\n' | wc -c)
            status="✅"
            [ "$desc_len" -le 1024 ] || { status="❌"; fail=1; }
            echo "| \`$file\` | $desc_len | $status |" >> descriptions.md
          done < <(find skills -name SKILL.md -print0)

          { echo 'table<<EOF'; cat descriptions.md; echo 'EOF'; } >> "$GITHUB_OUTPUT"
          exit $fail

      - name: Check tokens
        id: tokens
        if: steps.changed.outputs.any_changed == 'true'
        continue-on-error: true
        run: |
          IFS=' ' read -ra md_files <<< "${{ steps.changed-md.outputs.all_changed_files }}"

          if [ ${#md_files[@]} -eq 0 ]; then
            echo 'table=_No markdown files modified._' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "| File | Tokens | Limit | Status |"
            echo "|---|---|---|---|"
          } > tokens.md

          fail=0
          readarray -t token_counts < <(uv run .github/scripts/count_tokens.py "${md_files[@]}")

          for i in "${!md_files[@]}"; do
            file="${md_files[$i]}"
            tokens="${token_counts[$i]}"
            if [[ "$file" == */SKILL.md ]]; then
              [ "$tokens" -le 5000 ] && status="✅" || { status="❌"; fail=1; }
              echo "| \`$file\` | $tokens | 5000 | $status |" >> tokens.md
            else
              echo "| \`$file\` | $tokens | — | ℹ️ |" >> tokens.md
            fi
          done

          { echo 'table<<EOF'; cat tokens.md; echo 'EOF'; } >> "$GITHUB_OUTPUT"
          exit $fail

      - name: Post skill-lint result
        if: always() && steps.changed.outputs.any_changed == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: skill-lint
          message: |
            ${{ (steps.descriptions.outcome == 'success' && steps.tokens.outcome == 'success') && '✅ **Skill Lint Passed**' || '❌ **Skill Lint Failed**' }}

            #### Descriptions
            ${{ steps.descriptions.outputs.table }}

            #### Tokens
            ${{ steps.tokens.outputs.table }}

            _`description` ≤ 1024 chars · `SKILL.md` body ≤ 5000 tokens via `tiktoken cl100k_base` · [Anthropic best practices](https://platform.claude.com/docs/en/agents-and-tools/agent-skills/best-practices)_

      - name: Evaluate
        if: always() && steps.changed.outputs.any_changed == 'true'
        run: |
          [[ "${{ steps.descriptions.outcome }}" != "failure" && \
             "${{ steps.tokens.outcome }}"       != "failure" ]] || exit 1
