name: CI

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - 'skills/**'
      - '.claude-plugin/**'

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check version bumps and semver
        id: check
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          base="origin/$BASE_REF"
          git fetch origin "$BASE_REF" --depth=1
          changed=$(git diff --name-only "$base"...HEAD)

          semver='^[0-9]+\.[0-9]+\.[0-9]+$'
          check() {
            local file=$1 jq_path=$2 label=$3 pattern=$4
            local new old
            new=$(jq -r "$jq_path" "$file")
            [[ $new =~ $semver ]] || { echo "❌ Invalid semver in $file: $new"; return 1; }
            echo "$changed" | grep -qE "$pattern" || return 0
            old=$(git show "$base:$file" | jq -r "$jq_path")
            [ "$old" != "$new" ] || { echo "❌ $label changed but $file version not bumped ($old)"; return 1; }
            echo "✅ $label: $old → $new"
          }

          check .claude-plugin/plugin.json       .version          "Skills"      '^skills/'
          check .claude-plugin/marketplace.json  .metadata.version "Marketplace" '^\.claude-plugin/marketplace\.json$'

      - name: Post version-check result
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: version-check
          message: |
            ${{ job.status == 'success' && '✅ **Version Check Passed**' || '❌ **Version Check Failed**' }}

            **Bump rules:**
            - Skills modified → bump `.claude-plugin/plugin.json` version
            - Marketplace modified → bump `.claude-plugin/marketplace.json` version
            - Format: semantic versioning (`X.Y.Z`)

            **Semver guide:** `PATCH` = fixes · `MINOR` = features · `MAJOR` = breaking

  check-descriptions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check SKILL.md description lengths
        id: report
        run: |
          set +e
          fail=0
          {
            echo "| Skill | Description (chars / 1024) | Status |"
            echo "|---|---|---|"
          } > report.md

          while IFS= read -r -d '' file; do
            frontmatter=$(awk '/^---[[:space:]]*$/ { c++; next } c == 1' "$file")
            desc_len=$(echo "$frontmatter" | yq -r '.description // ""' | tr -d '\n' | wc -c)

            status="✅"
            [ "$desc_len" -le 1024 ] || { status="❌"; fail=1; }
            echo "| \`$file\` | $desc_len | $status |" >> report.md
          done < <(find skills -name SKILL.md -print0)

          cat report.md
          { echo 'table<<EOF'; cat report.md; echo 'EOF'; } >> "$GITHUB_OUTPUT"
          exit $fail

      - name: Post description-check result
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: check-descriptions
          message: |
            ${{ job.status == 'success' && '✅ **Description Check Passed**' || '❌ **Description Check Failed**' }}

            ${{ steps.report.outputs.table }}

            Frontmatter `description` must be ≤ 1024 characters ([hard cap](https://platform.claude.com/docs/en/agents-and-tools/agent-skills/best-practices)).

  check-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get changed markdown files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          files: '**/*.md'

      - uses: astral-sh/setup-uv@v5

      - name: Count tokens in modified markdown files
        id: report
        run: |
          set +e
          fail=0

          # All modified (non-deleted) .md files in this PR
          IFS=' ' read -ra md_files <<< "${{ steps.changed.outputs.all_changed_files }}"

          if [ ${#md_files[@]} -eq 0 ]; then
            echo "No markdown files modified."
            echo 'table=No markdown files modified.' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "| File | Tokens | Limit | Status |"
            echo "|---|---|---|---|"
          } > report.md

          readarray -t token_counts < <(uv run .github/scripts/count_tokens.py "${md_files[@]}")

          for i in "${!md_files[@]}"; do
            file="${md_files[$i]}"
            tokens="${token_counts[$i]}"

            if [[ "$file" == */SKILL.md ]]; then
              if [ "$tokens" -gt 5000 ]; then
                status="❌"; fail=1
              else
                status="✅"
              fi
              echo "| \`$file\` | $tokens | 5000 | $status |" >> report.md
            else
              echo "| \`$file\` | $tokens | — | ℹ️ |" >> report.md
            fi
          done

          cat report.md
          { echo 'table<<EOF'; cat report.md; echo 'EOF'; } >> "$GITHUB_OUTPUT"
          exit $fail

      - name: Post token-check result
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: check-tokens
          message: |
            ${{ job.status == 'success' && '✅ **Token Check Passed**' || '❌ **Token Check Failed**' }}

            ${{ steps.report.outputs.table }}

            `SKILL.md` body must be ≤ 5000 tokens · other `.md` files shown for reference · counted via `tiktoken cl100k_base`
